name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
      NPM_CONFIG_CACHE: /tmp/npm-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); const tag = process.env.RELEASE_TAG; if (tag !== pkg.version && tag !== `v${pkg.version}`) { console.error(`Release tag ${tag} does not match package version ${pkg.version}`); process.exit(1); }"
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Verify npm version is unpublished
        run: |
          node <<'EOF'
          const { spawnSync } = require("node:child_process");
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const spec = `${pkg.name}@${pkg.version}`;
          const result = spawnSync("npm", ["view", spec, "version"], {
            encoding: "utf8",
            stdio: ["ignore", "pipe", "pipe"],
          });

          if (result.status === 0) {
            console.error(`${spec} is already published.`);
            process.exit(1);
          }

          const output = `${result.stdout}\n${result.stderr}`;
          if (!output.includes("E404") && !output.includes("404")) {
            console.error(output.trim() || `Could not verify ${spec} on npm.`);
            process.exit(result.status ?? 1);
          }
          EOF

      - name: Run VitePlus checks
        run: npm run check

      - name: Run TypeScript
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Validate VitePlus package build
        run: npm run pack:check

      - name: Validate published types
        run: npm run types:check

      - name: Publish to npm
        run: npm publish --access public
